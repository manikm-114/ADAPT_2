run:
  seed: 123
  out_dir: outputs/runs
  run_name: quality_drift
  overwrite: false

sim:
  T: 25

submissions:
  mean_per_timestep: 30
  quality_mean: 0.60
  quality_std: 0.15
  complexity_mean: 0.50
  complexity_std: 0.20

reviewers:
  n_humans: 200
  n_ai: 30
  max_load: 6
  ai_enabled: true

review_process:
  k_reviewers: 3
  ai_fraction_target: 0.10
  escalation_enabled: true
  escalation_max_rounds: 2
  disagreement_threshold: 1.2
  completeness_threshold: 0.55

decision:
  accept_threshold: 0.70
  reject_threshold: 0.40
  disagreement_guard: 1.4

metrics:
  track_time_series: true

triage:
  threshold: 0.45

capacity:
  max_reviews_per_timestep: 180

scenario:
  quality_drift:
    start_t: 0
    end_t: 24
    quality_mean: 0.40

governance:
  # Allow disagreement alone to trigger triage
  backlog_high: 1
  backlog_low: 0

  ai_min: 0.10
  ai_max: 0.10
  ai_step: 0.0

  triage_step: 0.02
  triage_max: 0.60

  disagreement_high: 1.0
  disagreement_low: 0.85
