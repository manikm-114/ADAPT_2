run:
  seed: 123
  out_dir: outputs/runs
  overwrite: false

sim:
  T: 20

submissions:
  mean_per_timestep: 25
  quality_mean: 0.60
  quality_std: 0.15
  complexity_mean: 0.50
  complexity_std: 0.20

reviewers:
  n_humans: 200
  n_ai: 30
  max_load: 6
  ai_enabled: true

review_process:
  k_reviewers: 3
  ai_fraction_target: 0.10
  escalation_enabled: true
  escalation_max_rounds: 1
  disagreement_threshold: 1.0
  completeness_threshold: 0.55

decision:
  accept_threshold: 0.70
  reject_threshold: 0.40
  disagreement_guard: 1.4

triage:
  threshold: 0.45

capacity:
  max_reviews_per_timestep: 180

governance:
  backlog_high: 40
  backlog_low: 10

  ai_min: 0.10
  ai_max: 0.25
  ai_step: 0.02

  disagreement_high: 0.90
  disagreement_low: 0.35
  escalation_cooldown: 3
  triage_max: 0.60
  recovery_triage_boost: 0.08
  recovery_steps: 4


scenario:
  disagreement_spike:
    start_t: 10
    end_t: 16
    noise_multiplier: 2.2
