run:
  seed: 123
  out_dir: outputs/runs
  run_name: submission_surge_recovery
  overwrite: false

sim:
  T: 30

submissions:
  mean_per_timestep: 30
  quality_mean: 0.60
  quality_std: 0.15
  complexity_mean: 0.50
  complexity_std: 0.20

reviewers:
  n_humans: 200
  n_ai: 30
  max_load: 6
  ai_enabled: true

review_process:
  k_reviewers: 3
  ai_fraction_target: 0.20
  escalation_enabled: true
  escalation_max_rounds: 2
  disagreement_threshold: 1.4
  completeness_threshold: 0.55

decision:
  accept_threshold: 0.70
  reject_threshold: 0.40
  disagreement_guard: 1.4

triage:
  threshold: 0.45

capacity:
  max_reviews_per_timestep: 45

governance:
  backlog_high: 40
  backlog_low: 15

  ai_min: 0.13
  ai_max: 0.60
  ai_step: 0.03

  triage_step: 0.03
  triage_max: 0.70

  disagreement_high: 1.8
  disagreement_low: 0.8

# 🔑 Scenario definition (THIS IS NEW)
scenario:
  submission_surge:
    start_t: 5
    end_t: 12
    mean_per_timestep: 90

  recovery:
    start_t: 13
    end_t: 22
    capacity_boost: 2.5
