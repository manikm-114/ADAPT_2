run:
  seed: 123
  out_dir: outputs/runs
  run_name: quality_drift
  overwrite: false

sim:
  T: 20  # timesteps

# -------------------------------
# Submissions: stable volume,
# degrading quality over time
# -------------------------------
submissions:
  mean_per_timestep: 30
  quality_mean: 0.60        # initial quality
  quality_std: 0.15
  complexity_mean: 0.50
  complexity_std: 0.20

scenario:
  quality_drift:
    start_t: 0
    end_t: 19
    quality_mean: 0.40      # sustained downward drift

# -------------------------------
# Reviewers unchanged
# -------------------------------
reviewers:
  n_humans: 200
  n_ai: 30
  max_load: 6
  ai_enabled: true

# -------------------------------
# Review process: AI not the lever
# -------------------------------
review_process:
  k_reviewers: 3
  ai_fraction_target: 0.10   # intentionally low & fixed
  escalation_enabled: true
  escalation_max_rounds: 2
  disagreement_threshold: 1.0
  completeness_threshold: 0.55

# -------------------------------
# Decision unchanged
# -------------------------------
decision:
  accept_threshold: 0.70
  reject_threshold: 0.40
  disagreement_guard: 1.0

metrics:
  track_time_series: true

# -------------------------------
# Triage: primary control axis
# -------------------------------
triage:
  threshold: 0.45

capacity:
  max_reviews_per_timestep: 180

# -------------------------------
# Governance: tuned for quality,
# not throughput
# -------------------------------
governance:
  backlog_high: 80          # relaxed so backlog is not dominant
  backlog_low: 20

  ai_min: 0.10
  ai_max: 0.20              # prevent AI saturation
  ai_step: 0.025

  triage_step: 0.02
  triage_max: 0.65

  disagreement_high: 0.95
  disagreement_low: 0.8
